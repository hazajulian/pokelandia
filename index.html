<!doctype html>
<html lang="es">
  <head>
    <!-- Codificación -->
    <meta charset="UTF-8" />

    <!-- Responsive -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- SEO -->
    <title>
      PokéLandia | Pokédex moderna creada con React y PokéAPI
    </title>

    <meta
      name="description"
      content="Explora más de 1000 Pokémon, consulta estadísticas, habilidades, tipos y características en una Pokédex moderna desarrollada con React y PokéAPI."
    />

    <meta
      name="keywords"
      content="Pokémon, Pokédex, PokéAPI, React, Pikachu, Charizard, Bulbasaur, PokéLandia, tipos Pokémon, habilidades Pokémon, estadísticas Pokémon"
    />

    <meta
      name="author"
      content="Julián Haza"
    />

    <meta
      name="robots"
      content="index, follow"
    />

    <meta
      name="theme-color"
      content="#ffcb05"
    />

    <!-- Iconos -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/poke-ico.png"
    />

    <link
      rel="shortcut icon"
      href="/poke-ico.png"
    />

    <link
      rel="apple-touch-icon"
      sizes="192x192"
      href="/poke-icon-192.png"
    />

    <link
      rel="manifest"
      href="/site.webmanifest"
    />

    <!-- Canonical -->

    <link
      rel="canonical"
      href="https://pokelandia-iota.vercel.app/"
    />

    <!-- Open Graph -->

    <meta
      property="og:type"
      content="website"
    />

    <meta
      property="og:locale"
      content="es_AR"
    />

    <meta
      property="og:site_name"
      content="PokéLandia"
    />

    <meta
      property="og:title"
      content="PokéLandia | Pokédex moderna creada con React y PokéAPI"
    />

    <meta
      property="og:description"
      content="Explora más de 1000 Pokémon, consulta estadísticas, habilidades, tipos y características en una Pokédex moderna desarrollada con React."
    />

    <meta
      property="og:url"
      content="https://pokelandia-iota.vercel.app/"
    />

    <meta
      property="og:image"
      content="https://pokelandia-iota.vercel.app/pokelandia-linkedin-preview.jpg"
    />

    <meta
      property="og:image:secure_url"
      content="https://pokelandia-iota.vercel.app/pokelandia-linkedin-preview.jpg"
    />

    <meta
      property="og:image:type"
      content="image/jpeg"
    />

    <meta
      property="og:image:width"
      content="1200"
    />

    <meta
      property="og:image:height"
      content="630"
    />

    <meta
      property="og:image:alt"
      content="Vista principal de PokéLandia"
    />

    <!-- Twitter / X -->

    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="PokéLandia | Pokédex moderna"
    />

    <meta
      name="twitter:description"
      content="Explora más de 1000 Pokémon desde una Pokédex moderna desarrollada con React y PokéAPI."
    />

    <meta
      name="twitter:image"
      content="https://pokelandia-iota.vercel.app/pokelandia-linkedin-preview.jpg"
    />

    <meta
      name="twitter:image:alt"
      content="Vista principal de PokéLandia"
    />

    <!-- Google Fonts -->

    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Righteous&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <noscript>
      Necesitas habilitar JavaScript para utilizar
      PokéLandia.
    </noscript>

    <div id="root"></div>

    <script
      type="module"
      src="/src/main.jsx"
    ></script>
  </body>
</html>
