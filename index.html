<!doctype html>
<html lang="es">
  <head>
    <!-- Codificación -->
    <meta charset="UTF-8" />

    <!-- Responsive -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- SEO -->
    <title>
      PokeLandia | Pokédex creada con React y PokéAPI
    </title>

    <meta
      name="description"
      content="Explora más de 1000 Pokémon, consulta estadísticas, habilidades, tipos, movimientos y guarda tus favoritos. PokéLandia es una Pokédex moderna desarrollada con React y PokéAPI."
    />

    <meta
      name="keywords"
      content="Pokémon, Pokédex, React, PokéAPI, Pikachu, Bulbasaur, Charizard, Pokelandia, tipos Pokémon, estadísticas Pokémon"
    />

    <meta
      name="author"
      content="Julián Haza"
    />

    <meta
      name="robots"
      content="index, follow"
    />

    <meta
      name="theme-color"
      content="#ffcb05"
    />

    <!-- Favicon -->

    <link
      rel="icon"
      type="image/png"
      href="/poke-ico.png"
    />

    <link
      rel="apple-touch-icon"
      href="/poke-ico.png"
    />

    <!-- Open Graph -->

    <meta
      property="og:type"
      content="website"
    />

    <meta
      property="og:locale"
      content="es_AR"
    />

    <meta
      property="og:title"
      content="PokéLandia"
    />

    <meta
      property="og:description"
      content="Una Pokédex moderna creada con React y PokéAPI."
    />

    <!-- Reemplazar cuando hagas el deploy -->
    <meta
      property="og:url"
      content="https://pokelandia-iota.vercel.app/"
    />

    <meta
      property="og:image"
      content="/home-hero.png"
    />

    <!-- Twitter -->

    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="PokéLandia"
    />

    <meta
      name="twitter:description"
      content="Explora cientos de Pokémon desde una Pokédex moderna desarrollada con React."
    />

    <meta
      name="twitter:image"
      content="/home-hero.png"
    />

    <!-- Google Fonts -->

    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Righteous&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <noscript>
      Necesitas habilitar JavaScript para utilizar
      PokéLandia.
    </noscript>

    <div id="root"></div>

    <script
      type="module"
      src="/src/main.jsx"
    ></script>
  </body>
</html>
